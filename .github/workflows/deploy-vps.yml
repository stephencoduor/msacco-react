name: Deploy React App to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-react
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            bash /opt/msacco-react/deploy-react.sh

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "http://${{ secrets.VPS_HOST }}:4300" --max-time 30 || echo "000")
          echo "React app status: ${STATUS}"
          [ "$STATUS" = "200" ] && echo "✅ React app OK" || echo "⚠️ React app returned ${STATUS}"
