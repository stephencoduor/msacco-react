name: Deploy React App to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-react
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=msacco-react:main-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_ORGANIZATION }}/${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKER_ORGANIZATION }}/msacco-react:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_ORGANIZATION }}/${{ needs.build-and-push.outputs.image_tag }}"
            echo "==> Deploying React app: ${IMAGE}"

            docker pull "${IMAGE}"

            # Stop and remove existing react container if running
            docker stop msacco-react 2>/dev/null || true
            docker rm msacco-react 2>/dev/null || true

            # Run new container on port 4300
            docker run -d \
              --name msacco-react \
              --restart unless-stopped \
              -p 4300:80 \
              "${IMAGE}"

            echo "==> React app deployed on port 4300"
            docker ps --filter "name=msacco-react"

  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check React app
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "http://${{ secrets.VPS_HOST }}:4300" --max-time 30 || echo "000")
          echo "React app status: ${STATUS}"
          [ "$STATUS" = "200" ] && echo "✅ React app OK" || echo "⚠️ React app returned ${STATUS}"
